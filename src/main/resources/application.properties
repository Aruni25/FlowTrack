# ========================================================================
# VERIFICATION SERVICE CONFIGURATION (Prompt 2)
# ========================================================================

# Verification Mode: MOCK (for testing) or REAL (production with actual API calls)
verification.mode=MOCK

# Auto-trigger verifications on business profile creation
# If true, GST/PAN/CIN verifications are automatically triggered after profile creation
verification.auto=true

# WebClient Configuration
verification.webclient.connection-timeout=10000
verification.webclient.read-timeout=30000
verification.webclient.write-timeout=10000
verification.webclient.max-connections=50
verification.webclient.retry-attempts=3
verification.webclient.retry-delay-ms=1000

# GST Verification API Configuration
# Use GSTN API or third-party providers like Signzy, Karza, AuthBridge
verification.gst.api.url=https://api.example.com/gst/verify
verification.gst.api.key=your_gst_api_key_here
verification.gst.timeout-ms=30000

# PAN Verification API Configuration
# Use NSDL PAN Verification API or third-party providers
verification.pan.api.url=https://api.example.com/pan/verify
verification.pan.api.key=your_pan_api_key_here
verification.pan.timeout-ms=30000

# Bank Verification API Configuration (Penny Drop)
# Use Razorpay, Cashfree, PayU, or InstaMojo for penny drop verification
verification.bank.api.url=https://api.example.com/bank/pennydrop
verification.bank.api.key=your_bank_api_key_here
verification.bank.timeout-ms=45000

# CIN Verification API Configuration (MCA API)
# Use MCA21 API or third-party providers
verification.cin.api.url=https://api.example.com/cin/verify
verification.cin.api.key=your_cin_api_key_here
verification.cin.timeout-ms=30000